# ==========================================
# Distributed MiniSQL 全局统一配置文件
# ==========================================

# ------------------------------------------
# 1. Zookeeper 集群配置
# ------------------------------------------
# ZK 服务端地址 (集群部署时用逗号分隔，如 ip1:2181,ip2:2181)
zookeeper.address=127.0.0.1:22181
zookeeper.session.timeout.ms=5000
zookeeper.connection.timeout.ms=5000
# 命名空间，所有节点默认会自动加此父路径前缀
zookeeper.namespace=minisql

# ------------------------------------------
# 2. Master 模块配置
# ------------------------------------------
# Master RPC 服务监听的基础端口
master.rpc.port=8080
# 默认的 Master 节点名称标识
master.name=Master-Node-1

# ------------------------------------------
# 3. Region Server 模块配置
# ------------------------------------------
# Region RPC 服务监听的基础端口 
# (提示：本地起多个 Region 测试时，要求组员在代码启动参数中覆盖此端口，如9091, 9092)
region.rpc.port=9091
# 数据持久化落盘的根目录
region.storage.path=./minisql_data/

# ------------------------------------------
# 4. Client 模块配置
# ------------------------------------------
# 客户端发起 RPC 调用的超时时间
client.rpc.timeout.ms=3000